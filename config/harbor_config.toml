# Shared Harbor defaults.
# The caller supplies the task name at runtime.
experiments_dir = "experiments"
bootstrap_commands = [
  "command -v python3 >/dev/null 2>&1 || (apt-get update -qq && apt-get install -y --no-install-recommends python3)",
]
# A healthy apt bootstrap finishes in ~20-30s; a much higher value only lets a
# stalled mirror burn the whole window. Bound it low so a stall is killed fast
# and infra_retry (with the lock-safe preamble) gets clean retries well inside
# env_setup_timeout_sec instead of hanging until the trial budget is gone.
bootstrap_timeout_sec = 120
shared_verifier_task_names = [
  "build-cython-ext",
  "build-pmars",
  "build-pov-ray",
  "configure-git-webserver",
  "hf-model-inference",
  "kv-store-grpc",
  "nginx-request-logging",
  "pypi-server",
  "sqlite-with-gcov",
]

[environment]
type = "docker"
force_build = false
delete = true
suppress_override_warnings = false

