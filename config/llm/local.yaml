# The one file the quickstart asks you to edit. Both config/quickstart_train.yaml
# and config/quickstart_eval.yaml extend it, so training and held-out evaluation
# cannot drift onto different models. Defaults describe Qwen3.5-4B served locally.
llm_provider_config:
  # The id your server advertises at GET /v1/models, not the Hugging Face id:
  # Ollama exposes `qwen3.5:4b`, llama.cpp the GGUF filename, oMLX the model dir.
  model_name: Qwen3.5-4B-4bit
  base_url: http://127.0.0.1:8000/v1
  # Must not exceed what the server was started with.
  max_context_length: 32768
  # Hub repo whose tokenizer counts context. Required whenever model_name above
  # is not itself `org/name` shaped, else preflight fails with
  # "thinking_budget_tokens requires a resolvable tokenizer".
  tokenizer_name: Qwen/Qwen3.5-4B
  # Local servers that ignore auth still need this set; the quickstart defaults
  # it to `unused`. Export the real value if your server enforces a key.
  api_key_env: LOCAL_LLM_API_KEY
  # Pinned so a rerun of the same harness reproduces byte for byte -- which holds
  # only if the server decodes one request at a time (see the README).
  temperature: 1.0
  top_p: 0.95
  seed: 12345
  max_tokens: 8192
  enable_thinking: true
  thinking_budget_tokens: 6144
